name: CI

on:
  push:
  pull_request:

jobs:
  # Fast feedback: compile + native link, publish the APK.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup mmdebstrap
        run: |
          sudo apt update
          sudo apt install -yq curl binfmt-support qemu-user-static

          curl -L -o /tmp/mmdebstrap.deb http://ftp.us.debian.org/debian/pool/main/m/mmdebstrap/mmdebstrap_1.5.7-3_all.deb
          curl -L -o /tmp/keyring.deb http://ftp.us.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2025.1_all.deb

          sudo apt install -yq /tmp/mmdebstrap.deb /tmp/keyring.deb

      - name: Build Debian rootfs
        run: ./scripts/build-debian-rootfs.sh

      # ndkVersion from app/build.gradle is auto-installed by AGP via
      # sdkmanager (licenses are pre-accepted on hosted runners).
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # outputFileName renames this to Terminal_v<version>.apk
          # (app/build.gradle), so match by glob rather than a fixed name.
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # Full integration suite on an emulator; see docs/testing.md.
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Espresso clicks need animations off (docs/testing.md).
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-reports
          path: app/build/reports/androidTests/

  # On a tag push, publish a GitHub release with the debug APK attached,
  # but only once build and the full instrumented suite have gone green.
  release:
    needs: [build, instrumented-tests]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Create release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          generate_release_notes: true
